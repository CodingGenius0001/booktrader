name: Android Keystore Fingerprint

on:
  workflow_dispatch:

jobs:
  generate-debug-keystore:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Generate debug keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Print SHA-1 fingerprint
        run: |
          keytool -list -v \
            -alias androiddebugkey \
            -keystore debug.keystore \
            -storepass android \
            -keypass android | grep SHA1 | tee android-sha1.txt

      - name: Encode keystore for GitHub secret
        run: base64 -w 0 debug.keystore > android-debug-keystore-base64.txt

      - name: Upload credential helper artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-keystore-and-sha1
          path: |
            android-sha1.txt
            android-debug-keystore-base64.txt
          retention-days: 1
