name: Android APK

on:
  push:
    branches:
      - main
      - dev
      - "feature/**"
  pull_request:
  workflow_dispatch:

jobs:
  build-android-debug-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CI: 1
      EXPO_NO_TELEMETRY: 1
      EXPO_PUBLIC_BUILD_NUMBER: ${{ github.run_number }}
      EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
      EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
      EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
      EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
      EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID }}
      EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID }}
      EXPO_PUBLIC_EAS_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_EAS_PROJECT_ID }}
      ANDROID_DEBUG_KEYSTORE_BASE64: ${{ secrets.ANDROID_DEBUG_KEYSTORE_BASE64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Cache android/ project
        id: android-cache
        uses: actions/cache@v4
        with:
          path: android
          key: android-project-${{ hashFiles('package.json', 'app.json', 'eas.json') }}
          restore-keys: android-project-

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Typecheck
        run: npm run typecheck

      - name: Restore Android debug keystore
        if: env.ANDROID_DEBUG_KEYSTORE_BASE64 != ''
        run: |
          mkdir -p "$HOME/.android"
          echo "$ANDROID_DEBUG_KEYSTORE_BASE64" | base64 --decode > "$HOME/.android/debug.keystore"
          keytool -list -v -alias androiddebugkey -keystore "$HOME/.android/debug.keystore" -storepass android -keypass android | grep SHA1

      - name: Generate Android project
        if: steps.android-cache.outputs.cache-hit != 'true'
        run: npx expo prebuild --platform android --no-install

      - name: Copy debug keystore into android/
        if: env.ANDROID_DEBUG_KEYSTORE_BASE64 != ''
        run: cp "$HOME/.android/debug.keystore" android/app/debug.keystore

      - name: Patch android/ for async-storage and versionCode
        run: |
          node -e "const fs=require('fs'); const p='android/build.gradle'; let s=fs.readFileSync(p,'utf8'); const needle=\"    mavenCentral()\\n    maven { url 'https://www.jitpack.io' }\"; const insert=\"    mavenCentral()\\n    maven { url 'https://www.jitpack.io' }\\n    maven { url uri(project(':react-native-async-storage_async-storage').file('local_repo')) }\"; if (!s.includes(\"react-native-async-storage_async-storage\")) { fs.writeFileSync(p, s.replace(needle, insert)); }"
          sed -i "s/versionCode [0-9]*/versionCode ${{ github.run_number }}/" android/app/build.gradle
          printf '\norg.gradle.caching=true\norg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8\norg.gradle.configureondemand=true\n' >> android/gradle.properties

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --build-cache --parallel

      - name: Rename APK
        run: cp android/app/build/outputs/apk/release/app-release.apk booktrader.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: booktrader-release-apk
          path: booktrader.apk
          if-no-files-found: error

      - name: Publish GitHub Release (main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "BookTrader build ${{ github.run_number }}"
          body: |
            Build **${{ github.run_number }}** — commit `${{ github.sha }}`.

            ### Install
            1. Download `booktrader.apk` below.
            2. Open the file on your Android device.
            3. Enable *Install from unknown sources* in Settings if prompted.
          files: booktrader.apk
          fail_on_unmatched_files: true
          make_latest: "true"
